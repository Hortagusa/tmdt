{% extends 'users/base.html' %}

{% block body %}

<div class="container py-4" style="max-width:650px;">

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body p-4">

            <!-- Title -->
            <h4 class="fw-bold mb-2">
                <i class="bi bi-arrow-counterclockwise text-danger"></i>
                Return Request
            </h4>

            <p class="text-muted mb-4">
                Order ID:
                <span class="fw-semibold text-dark">#{{ order.id }}</span>
            </p>

            <!-- Alert -->
            <div class="alert alert-warning small">
                Please provide a clear reason for returning the product.
                Our team will review your request.
            </div>

            <!-- Form -->
            <form method="post">
                {% csrf_token %}

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Reason for return
                    </label>

                    <textarea
                        name="reason"
                        class="form-control rounded-3"
                        rows="4"
                        placeholder="Example: Product is damaged or not as described..."
                        required></textarea>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between">

                    <a href="{% url 'shops:order_detail' order.id %}"
                       class="btn btn-outline-secondary rounded-pill px-4">
                       ← Back
                    </a>

                    <button class="btn btn-danger rounded-pill px-4">
                        <i class="bi bi-send"></i>
                        Submit Request
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
