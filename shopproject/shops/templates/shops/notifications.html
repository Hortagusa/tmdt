{% extends 'users/base.html' %}
{% load humanize %}

{% block body %}

<div class="container py-4" style="max-width:700px;">

    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="fw-bold">
                <i class="bi bi-bell"></i> Notifications
            </h3>
            <p class="text-muted mb-0">
                Your recent activities
            </p>
        </div>

        {% if notifications %}
        <a href="{% url 'shops:mark_all_notifications_read' %}"
           class="btn btn-sm btn-outline-primary rounded-pill">
           Mark all as read
        </a>
        {% endif %}
    </div>

    <div class="card border-0 shadow-sm rounded-4">

        <div class="list-group list-group-flush">

            {% for n in notifications %}

            <div class="list-group-item d-flex justify-content-between align-items-start
                        {% if not n.is_read %}bg-light{% endif %}">

                <div>

                    <a href="{% url 'shops:read_notification' n.id %}"
                       class="text-decoration-none">

                        <div class="fw-semibold
                            {% if not n.is_read %}text-dark{% else %}text-muted{% endif %}">

                            {{ n.message }}

                        </div>

                    </a>

                    <small class="text-muted">
                        {{ n.created|naturaltime }}
                    </small>

                </div>

                <div class="d-flex gap-2">

                    <!-- delete notification -->
                    <a href="{% url 'shops:delete_notification' n.id %}"
                       class="btn btn-sm btn-outline-danger rounded-pill">
                        <i class="bi bi-trash"></i>
                    </a>

                </div>

            </div>

            {% empty %}

            <div class="text-center p-5">

                <i class="bi bi-bell-slash fs-1 text-muted"></i>

                <p class="text-muted mt-3">
                    No notifications
                </p>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

{% endblock %}
